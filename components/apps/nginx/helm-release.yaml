---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nginx-ingress
  namespace: <NAMESPACE>
spec:
  interval: 0m10s
  chart:
    spec:
      chart: nginx-ingress
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: nginx-stable
        namespace: flux-system
      interval: 5m0s
